<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Color Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .color-preview {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            font-size: 14px;
        }

        .color-info {
            padding: 15px;
            background: #f8f8f8;
        }

        .color-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .color-code {
            color: #666;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Gallery</h1>
        <p class="subtitle">Explore a beautiful collection of colors</p>

        <div class="gallery">
            <div class="card">
                <div class="color-preview" style="background-color: #FF6B6B;">FF6B6B</div>
                <div class="color-info">
                    <div class="color-name">Coral Red</div>
                    <div class="color-code">#FF6B6B</div>
                </div>
            </div>

            <div class="card">
                <div class="color-preview" style="background-color: #4ECDC4;">4ECDC4</div>
                <div class="color-info">
                    <div class="color-name">Turquoise</div>
                    <div class="color-code">#4ECDC4</div>
                </div>
            </div>

            <div class="card">
                <div class="color-preview" style="background-color: #45B7D1;">45B7D1</div>
                <div class="color-info">
                    <div class="color-name">Ocean Blue</div>
                    <div class="color-code">#45B7D1</div>
                </div>
            </div>

            <div class="card">
                <div class="color-preview" style="background-color: #FFA07A;">FFA07A</div>
                <div class="color-info">
                    <div class="color-name">Light Salmon</div>
                    <div class="color-code">#FFA07A</div>
                </div>
            </div>

            <div class="card">
                <div class="color-preview" style="background-color: #98D8C8;">98D8C8</div>
                <div class="color-info">
                    <div class="color-name">Mint Green</div>
                    <div class="color-code">#98D8C8</div>
                </div>
            </div>

            <div class="card">
                <div class="color-preview" style="background-color: #F7DC6F;">F7DC6F</div>
                <div class="color-info">
                    <div class="color-name">Gold Yellow</div>
                    <div class="color-code">#F7DC6F</div>
                </div>
            </div>

            <div class="card">
                <div class="color-preview" style="background-color: #BB8FCE;">BB8FCE</div>
                <div class="color-info">
                    <div class="color-name">Lavender</div>
                    <div class="color-code">#BB8FCE</div>
                </div>
            </div>

            <div class="card">
                <div class="color-preview" style="background-color: #85C1E2;">85C1E2</div>
                <div class="color-info">
                    <div class="color-name">Sky Blue</div>
                    <div class="color-code">#85C1E2</div>
                </div>
            </div>
        </div>

        <nav>
            <a href="index02.html">← Previous</a>
            <a href="index04.html">Next →</a>
        </nav>
    </div>
</body>
</html>
